name: CI/CD - Hedge Fund 13F Tracker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop on syntax errors or undefined names
        flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 scripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Initialize test database
      run: |
        python scripts/init_db.py --force --verify

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Test CLI commands
      run: |
        python scripts/hf-tracker list-funds
        python scripts/hf-tracker holdings --fund atreides-management --quarter 2024-Q4 --top 5

    - name: Test Alert Engine
      run: |
        python scripts/alert_engine.py --fund atreides-management --q1 2024-Q3 --q2 2024-Q4

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t hedge-fund-13f-tracker:latest .

    - name: Test Docker image
      run: |
        docker run --rm hedge-fund-13f-tracker:latest python scripts/init_db.py --verify

    - name: Log in to Docker Hub (if credentials provided)
      if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    - name: Push Docker image (if credentials provided)
      if: github.event_name != 'pull_request' && env.DOCKER_USERNAME != ''
      run: |
        docker tag hedge-fund-13f-tracker:latest ${{ secrets.DOCKER_USERNAME }}/hedge-fund-13f-tracker:latest
        docker tag hedge-fund-13f-tracker:latest ${{ secrets.DOCKER_USERNAME }}/hedge-fund-13f-tracker:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/hedge-fund-13f-tracker:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/hedge-fund-13f-tracker:${{ github.sha }}
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  security:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Run Bandit security scanner
      run: |
        pip install bandit
        bandit -r scripts/ -f json -o bandit-report.json || true
        bandit -r scripts/ -ll

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
